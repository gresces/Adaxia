{{ define "main" }}

<section id="list-container" class="no-select">
  <header id="list-container-title">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
  </header>

  <div id="list-container-list">
    {{ range .Pages }}
      <article class="summary-link">
        <a href="{{ .RelPermalink }}">
          <h2>{{ .LinkTitle }}</h2>
          <div>
            {{ .Summary }}
          </div>
        </a>
      </article>
    {{ end }}
  </div>
</section>
{{ end }}
