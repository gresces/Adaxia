{{ define "main" }}
<section id="tag-container" class="no-select">
  <header id="tag-container-title">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
  </header>

  <div id="tag-container-list">
    <ul>
      {{ range .Pages }}
        <li><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></li>
      {{ end }}
    </ul>
  </div>
</section>
{{ end }}
